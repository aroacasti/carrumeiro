<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrumeiro - Carta</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F3E5C7;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .logo {
            max-width: 600px;
            width: 90%;
            height: auto;
            margin: 0 auto;
            display: block;
        }

        .content {
            padding: 10px 0;
        }

        .section {
            margin-bottom: 50px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8em;
            color: #144AFB;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #144AFB;
            letter-spacing: 2px;
        }

        .menu-item {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(20, 74, 251, 0.2);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-name {
            font-size: 1.2em;
            font-weight: 700;
            color: #144AFB;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .item-price {
            color: #144AFB;
            font-weight: 700;
            font-size: 1.2em;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .item-description {
            font-size: 0.95em;
            color: #555;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .item-allergens {
            font-size: 0.85em;
            color: #144AFB;
            font-style: italic;
        }

        .footer {
            background-color: #144AFB;
            color: white;
            padding: 30px 20px;
            text-align: center;
            margin-top: 40px;
            border-radius: 0;
        }

        .social-icons {
            margin-top: 20px;
        }

        .social-icons a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9em;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #F3E5C7;
        }

        .note {
            padding: 20px 0;
            margin: 30px 0;
            font-size: 0.95em;
            color: #144AFB;
            font-weight: 600;
            border-top: 2px solid #144AFB;
            border-bottom: 2px solid #144AFB;
        }

        .batifondo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8em;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .logo {
                max-width: 100%;
            }
            
            .section-title {
                font-size: 2.2em;
            }
            
            .content {
                padding: 15px 0;
            }

            .item-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .item-name {
                font-size: 1.1em;
            }

            .item-price {
                margin-top: 5px;
            }
        }
    </style>
</head>

        // Función para renderizar un item del menú
        function renderMenuItem(item) {
            if (!item.active) return '';
            
            let html = `
                <div class="menu-item">
                    <div class="item-header">
                        <div class="item-name">${item.nombre}</div>
                        <div class="item-price">${item.precio}</div>
                    </div>`;
            
            if (item.descripcion) {
                html += `<div class="item-description">${item.descripcion}</div>`;
            }
            
            if (item.alergenos) {
                html += `<div class="item-allergens">Alérgenos: ${item.alergenos}</div>`;
            }
            
            html += `</div>`;
            return html;
        }

        // Función para renderizar una sección
        function renderSection(title, items) {
            const activeItems = items.filter(item => item.active);
            if (activeItems.length === 0) return '';
            
            let html = `
                <div class="section">
                    <h2 class="section-title">${title}</h2>`;
            
            activeItems.forEach(item => {
                html += renderMenuItem(item);
            });
            
            html += `</div>`;
            return html;
        }

        // Cargar y renderizar el menú
        function loadMenu() {
            let content = '';
            
            // Renderizar secciones
            content += renderSection('Entrantes', menuData.entrantes);
            content += renderSection('Mariscos', menuData.mariscos);
            content += renderSection('Principales', menuData.principales);
            
            // Nota de pescados
            if (menuData.principales.some(item => item.active && item.alergenos && item.alergenos.includes('Pescado'))) {
                content += `
                    <div class="note">
                        Todos nuestros pescados son frescos, salvajes y proceden de rías y lonjas gallegas
                    </div>`;
            }
            
            content += renderSection('Postres Caseros', menuData.postres);
            
            // Nota final
            content += `
                <div class="note">
                    Todos los precios incluyen el IVA · La adición de ingredientes puede suponer un incremento del precio
                    Existen hojas de reclamación a disposición del cliente
                    Lista de precios reglamentaria disponible en QR
                </div>`;
            
            document.getElementById('menu-content').innerHTML = content;
        }

        // Cargar el menú al cargar la página
